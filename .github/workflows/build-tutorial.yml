name: Build tutorial PDFs

on:
  push:
    branches:
      - main
    paths:
      - "docs/tutorial/**/*.md"
      - "docs/tutorial/build.sh"
      - ".github/workflows/build-tutorial.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: pandoc/latex:latest

    steps:
      - name: Install git + bash (Alpine base image)
        run: apk add --no-cache git bash

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Mark repo as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build PDFs
        shell: bash
        run: |
          cd docs/tutorial
          chmod +x build.sh
          ./build.sh

      - name: Publish PDFs to rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tutorial-pdfs-latest
          name: Patient Tutorial PDFs (latest)
          body: |
            Latest patient-tutorial PDFs in English, Spanish, and Haitian Creole.
            Rebuilt automatically whenever the Markdown sources change on `main`.

            Source revision: ${{ github.sha }}
          files: |
            docs/tutorial/pdf/tutorial_en.pdf
            docs/tutorial/pdf/tutorial_es.pdf
            docs/tutorial/pdf/tutorial_ht.pdf
          make_latest: "true"
