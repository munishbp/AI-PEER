name: Build tutorial PDFs

on:
  push:
    branches:
      - main
    paths:
      - "docs/tutorial/**/*.md"
      - "docs/tutorial/build.sh"
      - ".github/workflows/build-tutorial.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: pandoc/latex:latest

    steps:
      - name: Install git (needed for commit step)
        run: apk add --no-cache git bash

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Mark repo as safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build PDFs
        shell: bash
        run: |
          cd docs/tutorial
          chmod +x build.sh
          ./build.sh

      - name: Commit regenerated PDFs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/tutorial/pdf/*.pdf 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
            exit 0
          fi

          git commit -m "chore: rebuild tutorial PDFs"
          git push origin HEAD:${GITHUB_REF_NAME}
